<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCRIBBLE | Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Permanent+Marker&family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #fdfaf0;
            --marker-red: #d62828;
            --highlighter: rgba(0,255,157,0.3);
            --tape-color: rgba(255,255,255,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Architects Daughter', cursive;
            color: var(--ink);
            background: var(--paper);
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(253,250,240,0.95);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }

        .logo {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.8rem;
            transform: rotate(-2deg);
            text-decoration: none;
            color: var(--ink);
            line-height: 1;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            background: var(--tape-color);
            padding: 4px 14px;
            border: 1px solid #ccc;
            transform: rotate(1deg);
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ink);
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover,
        .nav-links a.active { border-bottom: 2px wavy var(--marker-red); color: var(--marker-red); }

        /* APP SHELL */
        .app {
            position: fixed;
            top: 56px; left: 0; right: 0; bottom: 0;
            display: flex;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            border-right: 2px solid rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            background: white;
        }

        .sidebar-head {
            padding: 14px 16px 10px;
            border-bottom: 2px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-head h2 {
            font-family: 'Permanent Marker', cursive;
            font-size: 1.2rem;
            transform: rotate(-1deg);
            display: inline-block;
        }

        .sidebar-search {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .sidebar-search input {
            width: 100%;
            padding: 6px 10px;
            border: 2px solid #ddd;
            background: var(--paper);
            font-family: 'Architects Daughter', cursive;
            font-size: 0.82rem;
            outline: none;
        }

        .sidebar-search input:focus { border-color: var(--marker-red); }

        .conv-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-list::-webkit-scrollbar { width: 3px; }
        .conv-list::-webkit-scrollbar-thumb { background: #ddd; }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.12s;
        }

        .conv-item:hover { background: var(--paper); }
        .conv-item.active { background: var(--paper); border-left-color: var(--marker-red); }

        .conv-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            position: relative;
        }

        .conv-avatar .pip {
            position: absolute;
            bottom: 1px; right: 1px;
            width: 9px; height: 9px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid white;
        }

        .conv-info { flex: 1; min-width: 0; }

        .conv-name {
            font-weight: bold;
            font-size: 0.88rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: 0.72rem;
            opacity: 0.45;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-time {
            font-size: 0.68rem;
            opacity: 0.3;
            flex-shrink: 0;
        }

        .unread {
            background: var(--marker-red);
            color: white;
            font-size: 0.62rem;
            font-family: 'Permanent Marker', cursive;
            padding: 1px 6px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* ── MAIN CHAT ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* empty */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0.4;
        }

        .empty .big { font-size: 3.5rem; }

        .empty p {
            font-family: 'Gochi Hand', cursive;
            font-size: 1.3rem;
        }

        /* chat panel */
        .chat-panel {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-panel.open { display: flex; }

        /* chat header */
        .chat-head {
            padding: 12px 18px;
            border-bottom: 2px solid rgba(0,0,0,0.07);
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            flex-shrink: 0;
        }

        .chat-head .ch-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        .chat-head-info h3 { font-size: 0.95rem; font-weight: bold; }
        .chat-head-info p  { font-size: 0.72rem; opacity: 0.45; }

        .chat-head-actions { margin-left: auto; display: flex; gap: 8px; }

        .icon-btn {
            width: 32px; height: 32px;
            border: 2px solid var(--ink);
            background: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            transition: 0.15s;
        }

        .icon-btn:hover { background: var(--ink); color: white; }

        /* messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; }

        .date-sep {
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.3;
            margin: 4px 0;
            position: relative;
        }

        .date-sep::before, .date-sep::after {
            content: '';
            position: absolute;
            top: 50%; width: 36%; height: 1px;
            background: var(--ink); opacity: 0.15;
        }

        .date-sep::before { left: 0; }
        .date-sep::after  { right: 0; }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 62%;
        }

        .msg.me   { align-self: flex-end; align-items: flex-end; }
        .msg.them { align-self: flex-start; align-items: flex-start; }

        .bubble {
            padding: 9px 13px;
            border: 2px solid var(--ink);
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg.me   .bubble { background: var(--ink); color: white; transform: rotate(0.3deg); }
        .msg.them .bubble { background: white; transform: rotate(-0.3deg); }

        .msg-time {
            font-size: 0.65rem;
            opacity: 0.3;
            margin-top: 2px;
        }

        /* typing indicator */
        .typing {
            display: none;
            align-self: flex-start;
            padding: 8px 14px;
            border: 2px solid var(--ink);
            background: white;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .typing.show { display: block; }

        .typing span {
            display: inline-block;
            animation: dot 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot {
            0%,80%,100% { transform: translateY(0); }
            40%          { transform: translateY(-4px); }
        }

        /* input */
        .chat-input {
            padding: 12px 16px;
            border-top: 2px solid rgba(0,0,0,0.07);
            display: flex;
            gap: 8px;
            align-items: flex-end;
            background: white;
            flex-shrink: 0;
        }

        .chat-input textarea {
            flex: 1;
            border: 2px solid var(--ink);
            background: var(--paper);
            font-family: 'Architects Daughter', cursive;
            font-size: 0.9rem;
            padding: 8px 11px;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 100px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }

        .chat-input textarea:focus { border-color: var(--marker-red); background: white; }

        .send-btn {
            font-family: 'Permanent Marker', cursive;
            background: var(--ink);
            color: white;
            border: none;
            padding: 9px 18px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .send-btn:hover { background: var(--marker-red); transform: rotate(1deg); }

        /* loading */
        .loading {
            text-align: center;
            padding: 30px;
            opacity: 0.4;
            font-size: 0.9rem;
        }

        /* MOBILE */
        @media (max-width: 680px) {
            html, body { overflow: auto; }
            .app { position: static; flex-direction: column; height: auto; }
            .sidebar { width: 100%; border-right: none; border-bottom: 2px solid rgba(0,0,0,0.08); max-height: 260px; }
            .main { min-height: 60vh; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">SCRIBBLE</a>
    <div class="nav-links">
        <a href="manifesto.html">Manifesto</a>
        <a href="match.html">Matches</a>
        <a href="chat.html" class="active">Chat</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-head">
            <h2>Messages 💬</h2>
        </div>
        <div class="sidebar-search">
            <input type="text" id="convSearch" placeholder="Search conversations..." oninput="filterConvs()" />
        </div>
        <div class="conv-list" id="convList">
            <div class="loading">Loading conversations...</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">

        <div class="empty" id="emptyState">
            <div class="big">💬</div>
            <p>Select a conversation</p>
        </div>

        <div class="chat-panel" id="chatPanel">
            <div class="chat-head">
                <div class="ch-avatar" id="chatAvatar"></div>
                <div class="chat-head-info">
                    <h3 id="chatName">—</h3>
                    <p id="chatSub">—</p>
                </div>
                <div class="chat-head-actions">
                    <button class="icon-btn" title="View profile" onclick="alert('Profile view coming soon!')">👤</button>
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="typing" id="typing">
                <span>●</span><span>●</span><span>●</span>
            </div>

            <div class="chat-input">
                <textarea id="msgInput" placeholder="Write something..."
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
                    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <button class="send-btn" onclick="sendMessage()">Send ✍️</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jlncfyucnhefshzmsyvm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsbmNmeXVjbmhlZnNoem1zeXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDAzNDksImV4cCI6MjA5MDE3NjM0OX0.ifGxina78eOSwobNBvreypFZHZ70OVpOKGQHYJOXdSI';

    const HEADERS = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };

    // Demo: current user is the first profile in DB
    // In production replace with real auth session
    let ME = null;
    let activeConvId = null;
    let allConvs = [];
    let pollTimer = null;

    async function init() {
        // get "me" — first profile for demo purposes
        const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=*&limit=1`, { headers: HEADERS });
        const data = await r.json();
        if (!data.length) {
            document.getElementById('convList').innerHTML = '<div class="loading">No profiles found. Join first.</div>';
            return;
        }
        ME = data[0];
        loadConversations();
    }

    async function loadConversations() {
        const r = await fetch(
            `${SUPABASE_URL}/rest/v1/conversations?select=*,profile_a:profiles!conversations_profile_a_id_fkey(id,name,avatar_color),profile_b:profiles!conversations_profile_b_id_fkey(id,name,avatar_color)&or=(profile_a_id.eq.${ME.id},profile_b_id.eq.${ME.id})&order=updated_at.desc`,
            { headers: HEADERS }
        );

        if (!r.ok) {
            document.getElementById('convList').innerHTML =
                '<div class="loading" style="color:var(--marker-red)">Tables not set up yet.<br>See console for SQL.</div>';
            printSetupSQL();
            return;
        }

        allConvs = await r.json();
        renderConvList(allConvs);
    }

    function renderConvList(convs) {
        const list = document.getElementById('convList');
        list.innerHTML = '';

        if (!convs.length) {
            list.innerHTML = '<div class="loading">No conversations yet.<br>Send a match request first!</div>';
            return;
        }

        convs.forEach(c => {
            const other = c.profile_a.id === ME.id ? c.profile_b : c.profile_a;
            const el = document.createElement('div');
            el.className = 'conv-item' + (c.id === activeConvId ? ' active' : '');
            el.id = 'conv-' + c.id;
            el.onclick = () => openConversation(c.id, other);
            el.innerHTML = `
                <div class="conv-avatar" style="background:${other.avatar_color || '#e0e0e0'}">
                    ${other.name.charAt(0).toUpperCase()}
                </div>
                <div class="conv-info">
                    <div class="conv-name">${other.name}</div>
                    <div class="conv-preview">${c.last_message || 'Say hello 👋'}</div>
                </div>
                <span class="conv-time">${formatTime(c.updated_at)}</span>`;
            list.appendChild(el);
        });
    }

    function filterConvs() {
        const q = document.getElementById('convSearch').value.toLowerCase();
        const filtered = allConvs.filter(c => {
            const other = c.profile_a.id === ME.id ? c.profile_b : c.profile_a;
            return other.name.toLowerCase().includes(q);
        });
        renderConvList(filtered);
    }

    async function openConversation(convId, other) {
        activeConvId = convId;

        // sidebar active
        document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
        const item = document.getElementById('conv-' + convId);
        if (item) item.classList.add('active');

        // header
        const av = document.getElementById('chatAvatar');
        av.textContent = other.name.charAt(0).toUpperCase();
        av.style.background = other.avatar_color || '#e0e0e0';
        document.getElementById('chatName').textContent = other.name;
        document.getElementById('chatSub').textContent = other.college || '';

        // show panel
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatPanel').classList.add('open');

        await fetchMessages(convId);

        // start polling for new messages
        clearInterval(pollTimer);
        pollTimer = setInterval(() => fetchMessages(convId), 3000);
    }

    let lastMsgCount = 0;

    async function fetchMessages(convId) {
        const r = await fetch(
            `${SUPABASE_URL}/rest/v1/messages?conversation_id=eq.${convId}&select=*&order=created_at.asc`,
            { headers: HEADERS }
        );

        if (!r.ok) return;
        const msgs = await r.json();

        if (msgs.length === lastMsgCount) return;
        lastMsgCount = msgs.length;

        const el = document.getElementById('messages');
        el.innerHTML = '<div class="date-sep">Today</div>';

        msgs.forEach(m => {
            const isMe = m.sender_id === ME.id;
            const d = document.createElement('div');
            d.className = 'msg ' + (isMe ? 'me' : 'them');
            d.innerHTML = `
                <div class="bubble">${escHtml(m.content)}</div>
                <span class="msg-time">${formatTime(m.created_at)}</span>`;
            el.appendChild(d);
        });

        el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !activeConvId || !ME) return;

        input.value = '';
        input.style.height = 'auto';

        // optimistic UI
        const el = document.getElementById('messages');
        const d = document.createElement('div');
        d.className = 'msg me';
        d.innerHTML = `<div class="bubble">${escHtml(text)}</div><span class="msg-time">just now</span>`;
        el.appendChild(d);
        el.scrollTop = el.scrollHeight;

        // insert to Supabase
        await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
            method: 'POST',
            headers: HEADERS,
            body: JSON.stringify({
                conversation_id: activeConvId,
                sender_id: ME.id,
                content: text
            })
        });

        // update last_message on conversation
        await fetch(`${SUPABASE_URL}/rest/v1/conversations?id=eq.${activeConvId}`, {
            method: 'PATCH',
            headers: HEADERS,
            body: JSON.stringify({ last_message: text, updated_at: new Date().toISOString() })
        });

        lastMsgCount++;
    }

    function formatTime(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function printSetupSQL() {
        console.log(`
-- Run this SQL in your Supabase SQL editor:

CREATE TABLE conversations (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  profile_a_id uuid REFERENCES profiles(id),
  profile_b_id uuid REFERENCES profiles(id),
  last_message text,
  updated_at timestamptz DEFAULT now(),
  created_at timestamptz DEFAULT now()
);

CREATE TABLE messages (
  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
  conversation_id uuid REFERENCES conversations(id) ON DELETE CASCADE,
  sender_id uuid REFERENCES profiles(id),
  content text NOT NULL,
  created_at timestamptz DEFAULT now()
);

-- Enable RLS (optional but recommended)
ALTER TABLE conversations ENABLE ROW LEVEL SECURITY;
ALTER TABLE messages ENABLE ROW LEVEL SECURITY;

-- Allow all for anon (demo only — tighten in production)
CREATE POLICY "allow all" ON conversations FOR ALL USING (true);
CREATE POLICY "allow all" ON messages FOR ALL USING (true);
        `);
    }

    init();
</script>
</body>
</html>
