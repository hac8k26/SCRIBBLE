    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

        );
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --orange: #fb923c; --orange-dark: #ea6c10; --orange-light: #fed7aa;
            --cream: #fffbf5; --paper: #fef3e2; --ink: #1c1410;
            --ink-light: #5c4a38; --ink-faint: #a08060;
        }
        body {
            background-color: var(--orange);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c2410c' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Indie Flower', cursive;
            color: var(--ink);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 48px; position: relative;
        }
        nav::after {
            content: ''; position: absolute; bottom: 0; left: 24px; right: 24px;
            height: 2px; background: var(--ink); border-radius: 2px; filter: url(#rs);
        }
        .logo {
            font-family: 'Indie Flower', cursive; font-size: 2rem; font-weight: 700;
            color: var(--ink); text-decoration: none; position: relative;
        }
        .logo::after {
            content: ''; position: absolute; bottom: 2px; left: -4px; right: -4px;
            height: 10px; background: var(--cream); z-index: -1;
            border-radius: 40% 60% 50% 70% / 60% 40% 70% 50%; opacity: 0.7;
        }
        .nav-links { display: flex; gap: 10px; align-items: center; }
        .nav-link {
            font-family: 'Indie Flower', cursive; font-size: 1.05rem; color: var(--ink);
            text-decoration: none; opacity: 0.65; transition: opacity 0.2s; padding: 4px 2px;
        }
        .nav-link:hover, .nav-link.active { opacity: 1; }
        .nav-link.active {
            border-bottom: 2.5px solid var(--ink);
        }
        .nav-sep { color: var(--ink); opacity: 0.25; font-size: 0.8rem; }
        @media(max-width:600px){ nav { padding: 16px 20px; } .nav-links { display: none; } }

        /* PAGE */
        .page { max-width: 1100px; margin: 0 auto; padding: 44px 48px 100px; }
        @media(max-width:768px){ .page { padding: 28px 20px 80px; } }

        /* HEADER ROW */
        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .page-title {
            font-family: 'Indie Flower', cursive; font-size: 2.8rem; font-weight: 700; line-height: 1;
        }
        .page-title span { color: var(--cream); position: relative; display: inline-block; }
        .page-title span::before {
            content: ''; position: absolute; inset: -3px -6px;
            background: var(--ink); z-index: -1;
            border-radius: 30% 70% 60% 40% / 50% 40% 60% 50%;
            filter: url(#rs);
        }
        .page-sub { font-size: 0.9rem; color: var(--ink); opacity: 0.65; margin-top: 6px; }

        /* COUNTDOWN */
        .countdown-pill {
            background: var(--ink); color: var(--orange);
            border-radius: 10px 28px 12px 24px / 24px 12px 28px 10px;
            padding: 12px 22px; filter: url(#rs);
            box-shadow: 4px 4px 0 var(--orange-dark);
            text-align: center;
        }
        .countdown-pill .cd-label {
            font-family: 'Indie Flower', cursive; font-size: 0.85rem; opacity: 0.7;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
        }
        .countdown-pill .cd-time {
            font-family: 'Indie Flower', cursive; font-size: 1.6rem; font-weight: 700;
            letter-spacing: 2px;
        }

        /* TABS */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
        }
        .tab {
            font-family: 'Indie Flower', cursive; font-size: 1.05rem; font-weight: 600;
            background: var(--cream); border: 2.5px solid var(--ink);
            padding: 7px 20px; border-radius: 8px 22px 10px 18px / 18px 10px 22px 8px;
            cursor: pointer; filter: url(#rs); transition: background 0.15s;
        }
        .tab.active { background: var(--ink); color: var(--orange); }
        .tab:hover:not(.active) { background: var(--orange-light); }

        /* MATCH GRID */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }

        /* MATCH CARD */
        .mcard {
            background: var(--cream); border: 3px solid var(--ink);
            border-radius: 12px 44px 14px 40px / 40px 14px 44px 12px;
            padding: 28px 24px; box-shadow: 7px 7px 0 var(--ink);
            filter: url(#rs); position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .mcard:hover { transform: translate(-3px,-3px); box-shadow: 10px 10px 0 var(--ink); }

        .mcard-top { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }

        .mavatar {
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid var(--ink); display: flex; align-items: center;
            justify-content: center; font-family: 'Indie Flower', cursive;
            font-size: 1.6rem; font-weight: 700; color: #fff;
            flex-shrink: 0; filter: url(#rs);
        }

        .mcard-name { font-family: 'Indie Flower', cursive; font-size: 1.5rem; font-weight: 700; }
        .mcard-meta { font-size: 0.82rem; color: var(--ink-faint); margin-top: 2px; }

        .new-badge {
            position: absolute; top: -10px; left: 18px;
            background: #22c55e; color: #fff; border: 2px solid var(--ink);
            font-family: 'Indie Flower', cursive; font-size: 0.85rem; font-weight: 700;
            padding: 3px 10px; border-radius: 100px;
            box-shadow: 2px 2px 0 var(--ink); filter: url(#rs);
        }

        /* COMPAT BAR */
        .compat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .compat-bar {
            flex: 1; height: 8px; background: var(--orange-light);
            border: 2px solid var(--ink); border-radius: 100px; overflow: hidden; filter: url(#rs);
        }
        .compat-fill { height: 100%; background: var(--ink); border-radius: 100px; }
        .compat-pct { font-family: 'Indie Flower', cursive; font-size: 1rem; font-weight: 700; white-space: nowrap; }

        /* SHARED INTERESTS */
        .shared-label {
            font-family: 'Indie Flower', cursive; font-size: 0.85rem; color: var(--ink-faint);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
        }
        .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
        .mtag {
            font-family: 'Indie Flower', cursive; font-size: 0.9rem;
            background: var(--orange-light); border: 2px solid var(--ink);
            padding: 3px 10px; border-radius: 100px; filter: url(#rs);
        }

        /* BIO SNIPPET */
        .mbio {
            font-size: 0.88rem; color: var(--ink-light); font-style: italic;
            background: var(--paper); border: 2px dashed var(--ink);
            border-radius: 6px 18px 8px 14px / 14px 8px 18px 6px;
            padding: 10px 12px; margin-bottom: 16px; filter: url(#rs);
            line-height: 1.6;
        }

        /* ACTION BUTTONS */
        .mcard-actions { display: flex; gap: 10px; }
        .btn-connect {
            flex: 1; font-family: 'Indie Flower', cursive; font-size: 1.1rem; font-weight: 700;
            background: var(--ink); color: var(--orange); border: 2.5px solid var(--ink);
            padding: 10px; border-radius: 8px 22px 10px 18px / 18px 10px 22px 8px;
            cursor: pointer; filter: url(#rs); transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 3px 3px 0 var(--ink-light);
        }
        .btn-connect:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink-light); }
        .btn-pass {
            font-family: 'Indie Flower', cursive; font-size: 1.1rem; font-weight: 600;
            background: var(--paper); color: var(--ink-light); border: 2.5px solid var(--ink);
            padding: 10px 18px; border-radius: 20px 8px 18px 10px / 10px 18px 8px 20px;
            cursor: pointer; filter: url(#rs); transition: background 0.15s;
        }
        .btn-pass:hover { background: var(--orange-light); color: var(--ink); }

        /* LOCKED CARD */
        .mcard.locked {
            opacity: 0.6; cursor: default;
        }
        .mcard.locked:hover { transform: none; box-shadow: 7px 7px 0 var(--ink); }
        .lock-overlay {
            text-align: center; padding: 20px 0;
        }
        .lock-overlay .lock-icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .lock-overlay p {
            font-family: 'Indie Flower', cursive; font-size: 1.1rem; color: var(--ink-light);
        }

        /* EMPTY STATE */
        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
        }
        .empty-state .es-emoji { font-size: 3.5rem; display: block; margin-bottom: 14px; }
        .empty-state h3 { font-family: 'Indie Flower', cursive; font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .empty-state p { color: var(--ink-light); font-size: 0.92rem; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--ink); color: var(--orange);
            font-family: 'Indie Flower', cursive; font-size: 1.1rem;
            padding: 12px 28px; border-radius: 100px;
            box-shadow: 4px 4px 0 var(--orange-dark); filter: url(#rs);
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            z-index: 999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* MODAL */
        .modal-bg {
            display: none; position: fixed; inset: 0;
            background: rgba(28,20,16,0.6); z-index: 200;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-bg.open { display: flex; }
        .modal {
            background: var(--cream); border: 3px solid var(--ink);
            border-radius: 12px 44px 14px 40px / 40px 14px 44px 12px;
            padding: 36px 32px; max-width: 420px; width: 100%;
            box-shadow: 10px 10px 0 var(--ink); filter: url(#rs);
            position: relative; animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        .modal h3 { font-family: 'Indie Flower', cursive; font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .modal p { font-size: 0.92rem; color: var(--ink-light); line-height: 1.7; margin-bottom: 22px; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-close {
            position: absolute; top: 14px; right: 18px;
            font-family: 'Indie Flower', cursive; font-size: 1.4rem; background: none;
            border: none; cursor: pointer; color: var(--ink-faint);
        }
    </style>

</head>
<body>
<svg style="display:none">
    <filter id="rs">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="8"/>
        <feDisplacementMap in="SourceGraphic" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
</svg>

<!-- NAV -->
<nav>
    <a class="logo" href="index.html">kindred</a>
    <div class="nav-links">
        <a class="nav-link" href="profile.html">My Profile</a>
        <span class="nav-sep">|</span>
        <a class="nav-link active" href="matches.html">Matches</a>
        <span class="nav-sep">|</span>
        <a class="nav-link" href="join.html">Edit Info</a>
    </div>
</nav>

<!-- PAGE -->
<div class="page">

    <div class="page-header">
        <div>
            <h1 class="page-title">Your <span>Matches</span> 💌</h1>
            <p class="page-sub">New matches drop every Friday at 8 PM · Vizag &amp; Anakapalli campuses</p>
        </div>
        <div class="countdown-pill">
            <div class="cd-label">Next drop in</div>
            <div class="cd-time" id="countdown">—</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="filterTab('all', this)">All matches</button>
        <button class="tab" onclick="filterTab('connected', this)">✅ Connected</button>
    </div>

    <!-- GRID -->
    <div class="match-grid" id="matchGrid"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONNECT MODAL -->
<div class="modal-bg" id="modalBg">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3 id="modalTitle">Connect with —</h3>
        <p id="modalBody"></p>
        <div class="modal-actions">
            <button class="btn-connect" style="flex:1" onclick="confirmConnect()">Send intro on WhatsApp 📲</button>
            <button class="btn-pass" onclick="closeModal()">Not now</button>
        </div>
    </div>
</div>

<script>
const iEmoji = { Music:'🎵', Movies:'🎬', Books:'📚', Gaming:'🎮', Travel:'✈️', Food:'🍜', Art:'🎨', Sports:'⚽', Coding:'💻', Memes:'😂' };

const raw = sessionStorage.getItem('kindredProfile');
const me = raw ? JSON.parse(raw) : null;

let allMatches = [];
let activeTab = 'all';
let pendingConnect = null;
const connectedSet = new Set();

const COLORS = ['#fb923c','#14b8a6','#8b5cf6','#f43f5e','#f59e0b','#3b82f6','#10b981'];

async function loadMatches() {
    const grid = document.getElementById('matchGrid');
    grid.innerHTML = `<div class="empty-state"><span class="es-emoji">⏳</span><h3>Loading…</h3></div>`;

    const { data, error } = await sb
        .from('profiles')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        grid.innerHTML = `<div class="empty-state"><span class="es-emoji">⚠️</span><h3>Couldn't load matches</h3><p>${error.message}</p></div>`;
        return;
    }

    // exclude current user
    allMatches = (data || [])
        .filter(p => !(me && p.id === me.id))
        .map((p, i) => ({
            id: p.id,
            name: p.name,
            age: p.age,
            init: p.name.charAt(0).toUpperCase(),
            color: p.avatar_color || COLORS[i % COLORS.length],
            college: p.college || '',
            gender: p.gender || '',
            compat: Math.floor(60 + ((p.name.charCodeAt(0) || 65) % 35)),
        }));

    renderGrid();
}

function renderCard(m) {
    const isConnected = connectedSet.has(m.id);
    return `
    <div class="mcard" id="card-${m.id}">
        <div class="new-badge">✨ New</div>
        <div class="mcard-top">
            <div class="mavatar" style="background:${m.color}">${m.init}</div>
            <div>
                <div class="mcard-name">${m.name}${m.age ? `, ${m.age}` : ''}</div>
                <div class="mcard-meta">${m.college ? m.college.split('(')[0].trim() : ''}${m.gender ? ' · ' + m.gender : ''}</div>
            </div>
        </div>
        <div class="compat-row">
            <div class="compat-bar"><div class="compat-fill" style="width:${m.compat}%"></div></div>
            <span class="compat-pct">${m.compat}% match</span>
        </div>
        <div class="mcard-actions" style="margin-top:14px">
            ${isConnected
                ? `<button class="btn-connect" style="background:#16a34a;border-color:#15803d" disabled>✅ Connected</button>`
                : `<button class="btn-connect" onclick="openModal('${m.id}')">Connect ♥</button>`
            }
            ${!isConnected ? `<button class="btn-pass" onclick="passCard('${m.id}')">Pass</button>` : ''}
        </div>
    </div>`;
}

function renderGrid() {
    const grid = document.getElementById('matchGrid');
    let list = activeTab === 'connected'
        ? allMatches.filter(m => connectedSet.has(m.id))
        : allMatches;

    if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state">
            <span class="es-emoji">🌱</span>
            <h3>${activeTab === 'connected' ? 'No connections yet' : 'No matches yet'}</h3>
            <p>${activeTab === 'connected'
                ? 'Connect with someone to see them here.'
                : 'Share the link with your campus friends — real matches appear here as people join.'
            }</p>
        </div>`;
        return;
    }
    grid.innerHTML = list.map(renderCard).join('');
}

function filterTab(tab, el) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderGrid();
}

function openModal(id) {
    pendingConnect = id;
    const m = allMatches.find(x => x.id === id);
    document.getElementById('modalTitle').textContent = `Connect with ${m.name}? 💌`;
    document.getElementById('modalBody').textContent =
        `We'll open WhatsApp so you can send ${m.name} a message. Once you connect, they'll see your profile too. Ready?`;
    document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
    document.getElementById('modalBg').classList.remove('open');
    pendingConnect = null;
}

function confirmConnect() {
    if (!pendingConnect) return;
    connectedSet.add(pendingConnect);
    closeModal();
    renderGrid();
    showToast('🎉 Connection sent! Check WhatsApp.');
}

function passCard(id) {
    allMatches = allMatches.filter(m => m.id !== id);
    renderGrid();
    showToast('Passed. No worries 👋');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function updateCountdown() {
    const now = new Date();
    const next = new Date(now);
    const daysUntilFri = (5 - now.getDay() + 7) % 7 || 7;
    next.setDate(now.getDate() + daysUntilFri);
    next.setHours(20, 0, 0, 0);
    const diff = next - now;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('countdown').textContent =
        `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

document.getElementById('modalBg').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// realtime — new profiles appear instantly
sb
    .channel('profiles')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'profiles' }, payload => {
        const p = payload.new;
        if (me && p.id === me.id) return;
        allMatches.unshift({
            id: p.id, name: p.name, age: p.age,
            init: p.name.charAt(0).toUpperCase(),
            color: p.avatar_color || '#fb923c',
            college: p.college || '', gender: p.gender || '',
            compat: Math.floor(60 + ((p.name.charCodeAt(0) || 65) % 35)),
        });
        renderGrid();
        showToast(`✨ ${p.name} just joined!`);
    })
    .subscribe();

loadMatches();
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
