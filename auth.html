<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAPKIN — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7; --text: #1a1a18; --secondary: #6b6b68;
            --border: #e5e5e1; --accent: #d97757; --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--mono);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* NAV */
        nav {
            width: 100%; padding: 20px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; text-decoration: none; }
        .nav-back { font-size: 10px; color: var(--secondary); text-decoration: none; letter-spacing: 0.05em; }
        .nav-back:hover { color: var(--accent); }

        /* MAIN */
        .auth-main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 24px 20px; overflow: hidden;
        }
        .auth-wrap { width: 100%; max-width: 440px; }

        /* HEADER */
        .auth-header { margin-bottom: 24px; }
        .auth-tag {
            font-size: 10px; color: var(--accent); letter-spacing: 0.15em;
            margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
        }
        .auth-tag::before { content: ''; width: 24px; height: 1px; background: var(--accent); display: inline-block; }
        .auth-title { font-size: 28px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; }
        .auth-title span { color: var(--accent); }
        .auth-sub { font-size: 11px; color: var(--secondary); line-height: 1.7; }

        /* FORM */
        .form-group { margin-bottom: 10px; }
        .form-label { font-size: 9px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 6px; display: block; }
        .form-input {
            width: 100%; padding: 11px 14px; border: 1px solid var(--border);
            background: var(--bg); font-family: var(--mono); font-size: 12px;
            color: var(--text); outline: none; transition: border-color 0.15s;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--secondary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .form-submit {
            width: 100%; padding: 15px; background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 12px; font-weight: 600;
            cursor: pointer; margin-top: 6px; letter-spacing: 0.05em; transition: background 0.15s;
        }
        .form-submit:hover { background: var(--accent); }

        /* INTEREST CHIPS */
        .chip-label { font-size: 9px; color: var(--accent); letter-spacing: 0.12em; margin-bottom: 8px; display: block; }
        .chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
        .chip {
            padding: 5px 11px; border: 1px solid var(--border); font-size: 9px;
            cursor: pointer; color: var(--secondary); letter-spacing: 0.05em;
            background: none; font-family: var(--mono); transition: all 0.12s;
        }
        .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* FOOTER NOTE */
        .form-note { font-size: 9px; color: var(--secondary); text-align: center; margin-top: 12px; line-height: 1.8; }
        .form-note a { color: var(--accent); text-decoration: none; }
        .form-note a:hover { text-decoration: underline; }

        /* BOTTOM BAR */
        .auth-footer {
            border-top: 1px solid var(--border); padding: 16px 40px;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 9px; color: var(--secondary); letter-spacing: 0.06em;
        }
        .auth-footer a { color: var(--secondary); text-decoration: none; }
        .auth-footer a:hover { color: var(--accent); }

        /* TOOLTIP */
        #tip { position: fixed; pointer-events: none; z-index: 99999; background: var(--text); color: var(--bg); font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; padding: 5px 9px; white-space: nowrap; opacity: 0; transition: opacity 0.15s; }
        #tip.show { opacity: 1; }

        @media (max-width: 540px) {
            nav { padding: 16px 20px; }
            .auth-footer { padding: 16px 20px; flex-direction: column; gap: 8px; text-align: center; }
            .oauth-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">NAPKIN</a>
    <a href="index.html" class="nav-back" data-tip="Back to home">← BACK_TO_HOME</a>
</nav>

<main class="auth-main">
    <div class="auth-wrap">

        <div class="auth-header">
            <div class="auth-tag">NAPKIN — OPEN SOURCE DATING</div>
            <h1 class="auth-title">Welcome<br><span>back.</span></h1>
            <p class="auth-sub">Sign in to your account to continue.</p>
        </div>

        <!-- LOGIN -->
        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">// EMAIL</label>
                <input class="form-input" id="login-email" type="email" placeholder="you@gmail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">// PASSWORD</label>
                <input class="form-input" id="login-password" type="password" placeholder="••••••••" required>
            </div>
            <div id="login-error" style="font-size:10px;color:#e05c5c;margin-top:8px;display:none;"></div>
            <button type="submit" class="form-submit" id="login-btn">$ LOGIN →</button>
            <div class="form-note">
                No account? <a href="join.html">CREATE_ONE →</a>
                &nbsp;·&nbsp;
                <a href="#" style="color:var(--secondary);">FORGOT_PASSWORD</a>
            </div>
        </form>

    </div>
</main>

<footer class="auth-footer">
    <span>NAPKIN — MIT_LICENSED · OPEN_SOURCE</span>
    <div style="display:flex;gap:20px;">
        <a href="privacy.html">PRIVACY</a>
        <a href="terms.html">TERMS</a>
        <a href="https://github.com" target="_blank">GITHUB ↗</a>
    </div>
</footer>

<div id="tip"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    const { createClient } = supabase;
    const sb = createClient(
        'https://kjewehpzmusixohhhnuq.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZXdlaHB6bXVzaXhvaGhobnVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODQ4ODgsImV4cCI6MjA5MDI2MDg4OH0.FCxActmtQ9kZt0rP4RvqCrDaXIVAAk8r_4PVLOxIFpA'
    );

    // Check if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'profile.html';
    });

    function setLoading(loading) {
        const btn = document.getElementById('login-btn');
        btn.disabled = loading;
        btn.textContent = loading ? '...' : '$ LOGIN →';
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.innerHTML = msg;
        el.style.display = 'block';
    }

    function hideError(id) {
        document.getElementById(id).style.display = 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        hideError('login-error');
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        setLoading(true);
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            showError('login-error', error.message || 'LOGIN_FAILED — check your credentials.');
            setLoading(false);
        } else {
            window.location.href = 'profile.html';
        }
    }

    (function(){
        const tip = document.getElementById('tip');
        let cur = null;
        document.addEventListener('mouseover', e => { const el = e.target.closest('[data-tip]'); if (!el) return; cur = el; tip.textContent = el.dataset.tip; tip.classList.add('show'); });
        document.addEventListener('mouseout', e => { if (cur && !cur.contains(e.relatedTarget)) { tip.classList.remove('show'); cur = null; } });
        document.addEventListener('mousemove', e => {
            if (!cur) return;
            const x = e.clientX + 14, y = e.clientY + 14;
            tip.style.left = (x + tip.offsetWidth > window.innerWidth ? e.clientX - tip.offsetWidth - 6 : x) + 'px';
            tip.style.top  = (y + tip.offsetHeight > window.innerHeight ? e.clientY - tip.offsetHeight - 6 : y) + 'px';
        });
        document.addEventListener('scroll', () => tip.classList.remove('show'), true);
    })();
</script>
</body>
</html>
