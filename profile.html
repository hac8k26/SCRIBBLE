<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindred — My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://jlncfyucnhefshzmsyvm.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsbmNmeXVjbmhlZnNoem1zeXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDAzNDksImV4cCI6MjA5MDE3NjM0OX0.ifGxina78eOSwobNBvreypFZHZ70OVpOKGQHYJOXdSI'
        );
    </script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --orange: #fb923c; --orange-dark: #ea6c10; --orange-light: #fed7aa;
            --cream: #fffbf5; --paper: #fef3e2; --ink: #1c1410;
            --ink-light: #5c4a38; --ink-faint: #a08060;
        }
        body {
            background-color: var(--orange);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c2410c' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Indie Flower', cursive;
            color: var(--ink);
            min-height: 100vh;
        }

        /* NAV */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 48px; position: relative;
        }
        nav::after {
            content: ''; position: absolute; bottom: 0; left: 24px; right: 24px;
            height: 2px; background: var(--ink); border-radius: 2px; filter: url(#rs);
        }
        .logo {
            font-family: 'Indie Flower', cursive; font-size: 2rem; font-weight: 700;
            color: var(--ink); text-decoration: none; position: relative;
        }
        .logo::after {
            content: ''; position: absolute; bottom: 2px; left: -4px; right: -4px;
            height: 10px; background: var(--cream); z-index: -1;
            border-radius: 40% 60% 50% 70% / 60% 40% 70% 50%; opacity: 0.7;
        }
        .nav-right { display: flex; gap: 14px; align-items: center; }
        .nav-tag {
            font-family: 'Indie Flower', cursive; font-size: 1rem;
            background: #bbf7d0; border: 2px solid var(--ink);
            padding: 5px 14px; border-radius: 100px; filter: url(#rs);
        }
        .nav-btn-sm {
            font-family: 'Indie Flower', cursive; font-size: 1rem; font-weight: 700;
            background: var(--ink); color: var(--orange); border: 2px solid var(--ink);
            padding: 7px 18px; border-radius: 8px 20px 10px 16px / 16px 10px 20px 8px;
            cursor: pointer; filter: url(#rs); transition: opacity 0.2s;
        }
        .nav-btn-sm:hover { opacity: 0.85; }
        @media(max-width:600px){ nav { padding: 16px 20px; } .nav-tag { display: none; } }

        /* PAGE LAYOUT */
        .page {
            max-width: 1100px; margin: 0 auto;
            padding: 48px 48px 100px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 28px;
            align-items: start;
        }
        @media(max-width:900px){ .page { grid-template-columns: 1fr; padding: 32px 20px 80px; } }

        /* SHARED CARD */
        .card {
            background: var(--cream); border: 3px solid var(--ink);
            border-radius: 12px 44px 14px 40px / 40px 14px 44px 12px;
            padding: 32px 28px; box-shadow: 7px 7px 0 var(--ink);
            filter: url(#rs); position: relative;
        }

        /* LEFT COLUMN */
        .profile-card { text-align: center; }

        .avatar-wrap {
            width: 110px; height: 110px; border-radius: 50%;
            border: 4px solid var(--ink); margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Indie Flower', cursive; font-size: 3rem; font-weight: 700;
            color: #fff; box-shadow: 5px 5px 0 var(--ink);
            filter: url(#rs); position: relative;
        }

        .online-dot {
            position: absolute; bottom: 6px; right: 6px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #22c55e; border: 3px solid var(--cream);
        }

        .profile-name {
            font-family: 'Indie Flower', cursive; font-size: 2rem; font-weight: 700; margin-bottom: 2px;
        }
        .profile-sub { font-size: 0.88rem; color: var(--ink-light); margin-bottom: 18px; }

        .profile-tags { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 20px; }
        .ptag {
            font-family: 'Indie Flower', cursive; font-size: 0.95rem;
            background: var(--orange-light); border: 2px solid var(--ink);
            padding: 3px 12px; border-radius: 100px; filter: url(#rs);
        }
        .ptag.dark { background: var(--ink); color: var(--orange); }

        .divider {
            height: 2px; background: var(--ink); opacity: 0.1;
            border-radius: 2px; margin: 18px 0; filter: url(#rs);
        }

        .info-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 12px; text-align: left;
        }
        .info-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
        .info-label { font-size: 0.75rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.5px; }
        .info-val { font-family: 'Indie Flower', cursive; font-size: 1.05rem; font-weight: 600; }

        .edit-btn {
            width: 100%; margin-top: 20px;
            font-family: 'Indie Flower', cursive; font-size: 1.1rem; font-weight: 700;
            background: transparent; color: var(--ink); border: 2.5px solid var(--ink);
            padding: 10px; border-radius: 8px 22px 10px 18px / 18px 10px 22px 8px;
            cursor: pointer; filter: url(#rs); transition: background 0.15s;
        }
        .edit-btn:hover { background: var(--orange-light); }

        /* RIGHT COLUMN */
        .right-col { display: flex; flex-direction: column; gap: 24px; }

        .card-title {
            font-family: 'Indie Flower', cursive; font-size: 1.4rem; font-weight: 700;
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }

        /* BIO */
        .bio-text {
            font-size: 1rem; color: var(--ink-light); line-height: 1.75;
            font-style: italic; background: var(--paper);
            border: 2px dashed var(--ink); border-radius: 8px 24px 10px 20px / 20px 10px 24px 8px;
            padding: 16px 18px; filter: url(#rs);
        }
        .bio-empty { color: var(--ink-faint); font-style: italic; }

        /* INTERESTS */
        .interest-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .interest-chip {
            font-family: 'Indie Flower', cursive; font-size: 1.05rem;
            background: var(--paper); border: 2.5px solid var(--ink);
            padding: 6px 16px; border-radius: 8px 22px 10px 18px / 18px 10px 22px 8px;
            filter: url(#rs);
        }

        /* STATS ROW */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
        }
        @media(max-width:500px){ .stats-row { grid-template-columns: 1fr 1fr; } }

        .stat-box {
            background: var(--paper); border: 2.5px solid var(--ink);
            border-radius: 8px 24px 10px 20px / 20px 10px 24px 8px;
            padding: 18px 14px; text-align: center; filter: url(#rs);
            box-shadow: 4px 4px 0 var(--ink);
        }
        .stat-box .sv {
            font-family: 'Indie Flower', cursive; font-size: 1.8rem; font-weight: 700;
            display: block; line-height: 1;
        }
        .stat-box .sl { font-size: 0.75rem; color: var(--ink-faint); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* MATCH PREVIEW */
        .match-preview {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
        }
        @media(max-width:500px){ .match-preview { grid-template-columns: 1fr; } }

        .match-card {
            background: var(--paper); border: 2.5px solid var(--ink);
            border-radius: 10px 32px 12px 28px / 28px 12px 32px 10px;
            padding: 18px 16px; filter: url(#rs);
            box-shadow: 4px 4px 0 var(--ink); position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .match-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }

        .match-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            border: 2.5px solid var(--ink); display: flex; align-items: center;
            justify-content: center; font-family: 'Indie Flower', cursive;
            font-size: 1.4rem; font-weight: 700; color: #fff;
            margin-bottom: 10px; filter: url(#rs);
        }
        .match-name { font-family: 'Indie Flower', cursive; font-size: 1.15rem; font-weight: 700; }
        .match-college { font-size: 0.78rem; color: var(--ink-faint); margin-bottom: 8px; }

        .compat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .compat-bar {
            flex: 1; height: 6px; background: var(--orange-light);
            border: 1.5px solid var(--ink); border-radius: 100px; overflow: hidden; filter: url(#rs);
        }
        .compat-fill { height: 100%; background: var(--ink); border-radius: 100px; }
        .compat-pct { font-family: 'Indie Flower', cursive; font-size: 0.9rem; font-weight: 700; white-space: nowrap; }

        .match-tags { display: flex; gap: 5px; flex-wrap: wrap; }
        .mtag {
            font-family: 'Indie Flower', cursive; font-size: 0.8rem;
            background: var(--orange-light); border: 1.5px solid var(--ink);
            padding: 2px 8px; border-radius: 100px; filter: url(#rs);
        }

        .match-locked {
            position: absolute; inset: 0; background: rgba(255,251,245,0.85);
            border-radius: inherit; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px;
            font-family: 'Indie Flower', cursive; font-size: 1rem; color: var(--ink-light);
            backdrop-filter: blur(2px);
        }
        .match-locked span { font-size: 1.8rem; }

        /* STICKY NOTE */
        .sticky-note {
            position: absolute; top: -14px; right: 14px;
            background: #fef08a; border: 2px solid var(--ink);
            padding: 6px 12px; font-family: 'Indie Flower', cursive; font-size: 0.9rem;
            box-shadow: 3px 3px 0 var(--ink); transform: rotate(3deg); filter: url(#rs);
        }

        /* CONFETTI BANNER */
        .welcome-banner {
            background: var(--ink); color: var(--orange);
            border-radius: 10px 36px 12px 32px / 32px 12px 36px 10px;
            padding: 20px 24px; filter: url(#rs);
            display: flex; align-items: center; gap: 14px;
            box-shadow: 6px 6px 0 var(--orange-dark);
        }
        .welcome-banner .wb-emoji { font-size: 2rem; flex-shrink: 0; }
        .welcome-banner h2 { font-family: 'Indie Flower', cursive; font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
        .welcome-banner p { font-size: 0.88rem; opacity: 0.75; }
    </style>
</head>
<body>
<svg style="display:none">
    <filter id="rs">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="8"/>
        <feDisplacementMap in="SourceGraphic" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
</svg>

<nav>
    <a class="logo" href="index.html">kindred</a>
    <div class="nav-right">
        <span class="nav-tag">✦ Profile created</span>
        <button class="nav-btn-sm" onclick="location.href='join.html'">Edit profile</button>
    </div>
</nav>

<div class="page" id="pageContent">
    <!-- filled by JS -->
</div>

<script>
const raw = sessionStorage.getItem('kindredProfile');
const p = raw ? JSON.parse(raw) : {
    name: "You", age: "—", gender: "—",
    college: "—", avatar_color: "#fb923c",
};

const initials = p.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
const lookingEmoji = { Relationship:'💑', Friendship:'🤝', 'Casual chat':'☕', 'Open to anything':'🌈' };

async function loadPage() {
    // count real matches (everyone except current user)
    const { count } = await sb
        .from('profiles')
        .select('*', { count: 'exact', head: true });

    const matchCount = Math.max(0, (count || 1) - 1);

    document.getElementById('pageContent').innerHTML = `
        <div>
            <div class="card profile-card">
                <div class="sticky-note">your profile ✨</div>
                <div class="avatar-wrap" style="background:${p.avatar_color || p.avatarColor || '#fb923c'}">
                    ${initials}
                    <div class="online-dot"></div>
                </div>
                <div class="profile-name">${p.name}</div>
                <div class="profile-sub">${p.age || '—'} · ${p.gender || '—'}</div>
                <div class="profile-tags">
                    ${p.lookingFor ? `<span class="ptag">${lookingEmoji[p.lookingFor]||''} ${p.lookingFor}</span>` : ''}
                </div>
                <div class="divider"></div>
                <div class="info-row">
                    <span class="info-icon">🎓</span>
                    <div>
                        <div class="info-label">College</div>
                        <div class="info-val">${p.college ? p.college.split('(')[0].trim() : '—'}</div>
                    </div>
                </div>
                <button class="edit-btn" onclick="location.href='join.html'">✏️ Edit profile</button>
            </div>
        </div>

        <div class="right-col">
            <div class="welcome-banner">
                <div class="wb-emoji">🎉</div>
                <div>
                    <h2>Welcome to Kindred, ${p.name}!</h2>
                    <p>Your profile is live on Supabase. Matches drop every Friday at 8 PM.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📊 Profile stats</div>
                <div class="stats-row">
                    <div class="stat-box">
                        <span class="sv">${matchCount}</span>
                        <div class="sl">People joined</div>
                    </div>
                    <div class="stat-box">
                        <span class="sv">Fri</span>
                        <div class="sl">Next drop</div>
                    </div>
                    <div class="stat-box">
                        <span class="sv">🔒</span>
                        <div class="sl">Private</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">💌 Your matches</div>
                <p style="font-size:1rem;color:var(--ink-light);margin-bottom:16px">
                    ${matchCount > 0
                        ? `${matchCount} ${matchCount === 1 ? 'person has' : 'people have'} joined from your area.`
                        : 'No one else has joined yet — share the link with your campus friends!'}
                </p>
                <a href="matches.html" style="display:inline-block;font-family:'Indie Flower',cursive;font-size:1.15rem;font-weight:700;background:var(--ink);color:var(--orange);padding:11px 28px;border-radius:8px 22px 10px 18px/18px 10px 22px 8px;text-decoration:none;box-shadow:4px 4px 0 var(--ink-light);filter:url(#rs)">See all matches →</a>
            </div>
        </div>
    `;
}

loadPage();
</script>
</body>
</html>
