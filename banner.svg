<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <rect width="1200" height="400" fill="#1a1a18"/>
  <!-- grid lines -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#2a2a28" stroke-width="1"/>
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#2a2a28" stroke-width="1"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#2a2a28" stroke-width="1"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="#2a2a28" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#2a2a28" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#2a2a28" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#2a2a28" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="400" stroke="#2a2a28" stroke-width="1"/>
  <line x1="1000" y1="0" x2="1000" y2="400" stroke="#2a2a28" stroke-width="1"/>
  <!-- accent bar -->
  <rect x="0" y="0" width="6" height="400" fill="#d97757"/>
  <!-- tag -->
  <text x="48" y="148" font-family="'IBM Plex Mono', monospace" font-size="13" fill="#d97757" letter-spacing="4">NAPKIN — OPEN SOURCE DATING</text>
  <!-- main title -->
  <text x="44" y="230" font-family="'IBM Plex Mono', monospace" font-size="80" font-weight="600" fill="#f9f9f7" letter-spacing="-2">NAPKIN</text>
  <!-- subtitle -->
  <text x="48" y="278" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#6b6b68" letter-spacing="2">No algorithms. No dark patterns. Just honest connections.</text>
  <!-- badges -->
  <rect x="48" y="310" width="100" height="28" rx="2" fill="#2a2a28"/>
  <text x="98" y="329" font-family="monospace" font-size="11" fill="#d97757" text-anchor="middle" letter-spacing="1">MIT LICENSE</text>
  <rect x="160" y="310" width="120" height="28" rx="2" fill="#2a2a28"/>
  <text x="220" y="329" font-family="monospace" font-size="11" fill="#6b6b68" text-anchor="middle" letter-spacing="1">OPEN SOURCE</text>
  <rect x="292" y="310" width="110" height="28" rx="2" fill="#2a2a28"/>
  <text x="347" y="329" font-family="monospace" font-size="11" fill="#6b6b68" text-anchor="middle" letter-spacing="1">SUPABASE</text>
  <!-- heart mark -->
  <text x="1120" y="220" font-family="monospace" font-size="80" fill="#d97757" opacity="0.15">♥</text>
</svg>
