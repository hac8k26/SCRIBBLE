<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAPKIN — Browse Profiles</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7; --text: #1a1a18; --secondary: #6b6b68;
            --border: #e5e5e1; --accent: #d97757; --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--mono); overflow-x: hidden; min-height: 100vh; }

        nav {
            width: 100%; padding: 20px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; text-decoration: none; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 11px; color: var(--secondary); text-decoration: none; letter-spacing: 0.05em; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .nav-cta { padding: 8px 18px; border: 1px solid var(--text); background: none; font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text); text-decoration: none; }
        .nav-cta:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* NOTIFICATION BELL */
        .nav-bell { position: relative; display: none; cursor: pointer; text-decoration: none; color: var(--text); padding: 6px; }
        .nav-bell svg { display: block; }
        .nav-bell:hover svg { color: var(--accent); }
        .bell-badge {
            position: absolute; top: 0; right: 0;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--accent); color: #fff;
            font-size: 8px; font-weight: 600;
            display: none; align-items: center; justify-content: center;
            font-family: var(--mono);
        }
        .bell-badge.show { display: flex; }

        /* NOTIFICATION DROPDOWN */
        .notif-dropdown {
            position: absolute; top: calc(100% + 10px); right: 0;
            width: 300px; background: var(--bg); border: 1px solid var(--border);
            z-index: 9999; display: none; flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .notif-dropdown.open { display: flex; }
        .notif-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 9px; color: var(--accent); letter-spacing: 0.12em; }
        .notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 10px; line-height: 1.6; cursor: pointer; }
        .notif-item:hover { background: #f1f1ee; }
        .notif-item:last-child { border-bottom: none; }
        .notif-item .notif-name { font-weight: 600; color: var(--accent); }
        .notif-item .notif-time { font-size: 8px; color: var(--secondary); margin-top: 2px; }
        .notif-empty { padding: 20px 16px; font-size: 10px; color: var(--secondary); text-align: center; }

        /* TOOLBAR */
        .toolbar {
            width: 100%; border-bottom: 1px solid var(--border);
            padding: 16px 40px; display: flex; align-items: center; gap: 12px;
            background: var(--bg);
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--border); padding: 8px 14px; flex: 1; min-width: 200px; max-width: 360px;
        }
        .search-box input {
            border: none; background: none; font-family: var(--mono); font-size: 11px;
            color: var(--text); outline: none; width: 100%;
        }
        .search-box input::placeholder { color: var(--secondary); }
        .search-box svg { color: var(--secondary); flex-shrink: 0; }
        .result-count { font-size: 10px; color: var(--secondary); margin-left: auto; letter-spacing: 0.05em; }

        /* LAYOUT */
        .browse-layout { min-height: calc(100vh - 120px); }

        /* PROFILE GRID */
        .profiles-area { padding: 24px 32px; }
        .profiles-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }

        /* PROFILE CARD */
        .profile-card {
            background: var(--bg); cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; gap: 12px; transition: background 0.15s;
        }
        .profile-card:hover { background: #f1f1ee; }
        .card-left { flex: 1; min-width: 0; }
        .card-name { font-size: 11px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-age  { font-size: 9px; color: var(--secondary); margin-bottom: 3px; letter-spacing: 0.04em; }
        .card-college { font-size: 8px; color: var(--secondary); letter-spacing: 0.03em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; opacity: 0.8; }
        .card-avatar { width: 48px; height: 48px; flex-shrink: 0; overflow: hidden; position: relative; }
        .card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(0.2); }
        .card-online { position: absolute; bottom: 2px; right: 2px; width: 7px; height: 7px; border-radius: 50%; background: #4caf50; border: 1px solid var(--bg); }

        /* MODAL */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,24,0.6); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-backdrop.open { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); max-width: 680px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; position: relative; }
        .modal-img { aspect-ratio: 3/4; overflow: hidden; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-body { padding: 28px 24px; display: flex; flex-direction: column; gap: 14px; }
        .modal-name { font-size: 20px; font-weight: 600; }
        .modal-meta { font-size: 10px; color: var(--secondary); letter-spacing: 0.05em; line-height: 1.8; }
        .modal-bio { font-size: 11px; color: var(--secondary); line-height: 1.8; }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .modal-tag { font-size: 9px; padding: 4px 8px; border: 1px solid var(--border); color: var(--secondary); }
        .modal-msg-box { display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); padding-top: 14px; margin-top: auto; }
        .modal-msg-label { font-size: 9px; color: var(--accent); letter-spacing: 0.12em; }
        .modal-msg-row { display: flex; gap: 6px; }
        .modal-msg-input {
            flex: 1; padding: 9px 12px; border: 1px solid var(--border);
            background: var(--bg); font-family: var(--mono); font-size: 11px;
            color: var(--text); outline: none;
        }
        .modal-msg-input:focus { border-color: var(--accent); }
        .modal-msg-input::placeholder { color: var(--secondary); }
        .modal-msg-send {
            padding: 9px 16px; background: var(--accent); color: #fff;
            border: none; font-family: var(--mono); font-size: 11px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
        }
        .modal-msg-send:hover { background: #c0603e; }
        .modal-msg-send:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-like { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; }
        .modal-like:hover { background: #c0603e; }
        .modal-pass { flex: 1; padding: 12px; background: none; color: var(--text); border: 1px solid var(--border); font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; }
        .modal-pass:hover { border-color: var(--text); }
        .modal-close { position: absolute; top: 12px; right: 12px; background: none; border: 1px solid var(--border); width: 28px; height: 28px; cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--secondary); display: flex; align-items: center; justify-content: center; z-index: 10; }
        .modal-close:hover { border-color: var(--accent); color: var(--accent); }

        /* MATCH TOAST */
        #match-toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
            background: var(--accent); color: #fff; font-family: var(--mono); font-size: 12px; font-weight: 600;
            padding: 16px 28px; z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s; letter-spacing: 0.05em;
        }
        #match-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* TOOLTIP */
        #tip { position: fixed; pointer-events: none; z-index: 99999; background: var(--text); color: var(--bg); font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; padding: 5px 9px; white-space: nowrap; opacity: 0; transition: opacity 0.15s; }
        #tip.show { opacity: 1; }

        /* AUTH GATE */
        #auth-gate {
            position: fixed; inset: 0; background: var(--bg); z-index: 99990;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        #auth-gate.show { display: flex; }
        .gate-box {
            border: 1px solid var(--border); padding: 40px 48px; max-width: 420px; width: 90%;
            display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center;
            border-left: 3px solid var(--accent);
        }
        .gate-icon { font-size: 28px; }
        .gate-title { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; }
        .gate-sub { font-size: 10px; color: var(--secondary); line-height: 1.8; letter-spacing: 0.04em; }
        .gate-btn {
            padding: 12px 28px; background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 11px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.05em; text-decoration: none; display: inline-block;
        }
        .gate-btn:hover { background: var(--accent); }

        @media (max-width: 900px) {
            nav { padding: 16px 20px; }
            .toolbar { padding: 12px 20px; }
            .profiles-area { padding: 16px; }
            .profiles-grid { grid-template-columns: repeat(3, 1fr); }
            .modal { grid-template-columns: 1fr; }
            .modal-img { aspect-ratio: 16/9; }
        }
        @media (max-width: 540px) {
            .nav-links { display: none; }
            .result-count { display: none; }
            .profiles-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo" data-tip="Back to home">NAPKIN</a>
    <div style="display:flex;align-items:center;gap:12px;">
        <a href="matches.html" class="nav-cta" id="nav-matches" style="display:none;" data-tip="View your matches">MY_MATCHES →</a>
        <!-- NOTIFICATION BELL -->
        <div class="nav-bell" id="nav-bell" onclick="toggleNotif(event)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <div class="bell-badge" id="bell-badge"></div>
            <div class="notif-dropdown" id="notif-dropdown">
                <div class="notif-header">// NOTIFICATIONS</div>
                <div id="notif-list"><div class="notif-empty">NO_NEW_NOTIFICATIONS</div></div>
            </div>
        </div>
        <a href="join.html" class="nav-cta" id="nav-cta" data-tip="Sign in to like profiles">LOGIN / JOIN →</a>
    </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
    <div class="search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="SEARCH_PROFILES..." oninput="filterProfiles()">
    </div>
    <span class="result-count" id="result-count">LOADING...</span>
</div>

<div class="browse-layout">
    <!-- PROFILES -->
    <main class="profiles-area">
        <div class="profiles-grid" id="profiles-grid"></div>
    </main>
</div>

<!-- PROFILE MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-inner">
        <button class="modal-close" onclick="closeModal(null, true)" data-tip="Close">✕</button>
        <div class="modal-img"><img id="modal-img" src="" alt=""></div>
        <div class="modal-body">
            <div>
                <div class="modal-name" id="modal-name"></div>
                <div class="modal-meta" id="modal-meta"></div>
            </div>
            <div class="modal-bio" id="modal-bio"></div>
            <div class="modal-tags" id="modal-tags"></div>
            <div class="modal-msg-box">
                <div class="modal-msg-label">// SEND_A_MESSAGE</div>
                <div class="modal-msg-row">
                    <input class="modal-msg-input" id="modal-msg-input" type="text" placeholder="Say something..." onkeydown="if(event.key==='Enter') sendFirstMessage()">
                    <button class="modal-msg-send" id="modal-msg-send" onclick="sendFirstMessage()">SEND →</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-like" onclick="likeProfile()" data-tip="Like this profile">♥ LIKE</button>
                <button class="modal-pass" onclick="closeModal(null,true)" data-tip="Pass">PASS →</button>
            </div>
        </div>
    </div>
</div>

<div id="match-toast">♥ IT'S A MATCH — START_CHATTING →</div>
<div id="tip"></div>
<div id="auth-gate">
    <div class="gate-box">
        <div class="gate-icon">⚠</div>
        <div class="gate-title">ACCESS_RESTRICTED</div>
        <div class="gate-sub">You need to join or login<br>before browsing profiles.</div>
        <a href="auth.html" class="gate-btn">$ LOGIN / JOIN →</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    const { createClient } = supabase;
    const sb = createClient(
        'https://kjewehpzmusixohhhnuq.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZXdlaHB6bXVzaXhvaGhobnVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODQ4ODgsImV4cCI6MjA5MDI2MDg4OH0.FCxActmtQ9kZt0rP4RvqCrDaXIVAAk8r_4PVLOxIFpA'
    );

    let currentUser = null;
    let PROFILES = [];
    let activeProfile = null;

    sb.auth.getSession().then(({ data: { session } }) => {
        if (!session) { document.getElementById('auth-gate').classList.add('show'); return; }
        currentUser = session.user;
        document.getElementById('nav-cta').style.display = 'none';
        document.getElementById('nav-matches').style.display = 'inline-block';
        document.getElementById('nav-bell').style.display = 'block';
        loadProfiles();
        loadNotifications();
        setInterval(loadNotifications, 15000); // poll every 15s
    });

    async function loadProfiles() {
        document.getElementById('result-count').textContent = 'LOADING...';
        const { data, error } = await sb.from('profiles')
            .select('*')
            .neq('id', currentUser.id);
        if (error) {
            document.getElementById('profiles-grid').innerHTML =
                `<div style="padding:40px;font-size:11px;color:#e05c5c;grid-column:1/-1;">ERROR: ${error.message}</div>`;
            document.getElementById('result-count').textContent = 'ERROR';
            return;
        }
        PROFILES = data || [];
        renderProfiles(PROFILES);
    }

    function renderProfiles(list) {
        const grid = document.getElementById('profiles-grid');
        document.getElementById('result-count').textContent = `${list.length}_PROFILES`;
        grid.innerHTML = '';
        if (list.length === 0) {
            grid.innerHTML = '<div style="padding:40px;font-size:11px;color:var(--secondary);grid-column:1/-1;">NO_PROFILES_FOUND</div>';
            return;
        }
        list.forEach(p => {
            const seed = Math.abs(p.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0)) % 1000;
            const card = document.createElement('div');
            card.className = 'profile-card';
            card.innerHTML = `
                <div class="card-left">
                    <div class="card-name">${p.name}</div>
                    <div class="card-age">AGE · ${p.age}</div>
                    <div class="card-college">${p.college || '—'}</div>
                </div>
                <div class="card-avatar">
                    <img src="https://picsum.photos/seed/${seed}/80/80" loading="lazy" alt="">
                </div>`;
            card.addEventListener('click', () => openModal(p));
            grid.appendChild(card);
        });
    }

    function filterProfiles() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const list = PROFILES.filter(p =>
            p.name.toLowerCase().includes(q) ||
            (p.college && p.college.toLowerCase().includes(q))
        );
        renderProfiles(list);
    }

    function openModal(p) {
        activeProfile = p;
        const seed = Math.abs(p.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0)) % 1000;
        document.getElementById('modal-img').src = `https://picsum.photos/seed/${seed}/400/600`;
        document.getElementById('modal-name').textContent = p.name;
        document.getElementById('modal-meta').innerHTML = `AGE: ${p.age}<br>COLLEGE: ${p.college || '—'}`;
        document.getElementById('modal-bio').textContent = p.bio || '';
        document.getElementById('modal-tags').innerHTML = '';
        document.getElementById('modal-msg-input').value = '';
        document.getElementById('modal-msg-send').disabled = false;
        document.getElementById('modal-msg-send').textContent = 'SEND →';
        document.getElementById('modal').classList.add('open');
    }

    function closeModal(e, force) {
        if (force || (e && e.target === document.getElementById('modal'))) {
            document.getElementById('modal').classList.remove('open');
        }
    }

    async function sendFirstMessage() {
        const input = document.getElementById('modal-msg-input');
        const btn = document.getElementById('modal-msg-send');
        const text = input.value.trim();
        if (!text || !activeProfile) return;
        btn.disabled = true; btn.textContent = '...';

        // check if match exists
        const { data: existing } = await sb.from('matches')
            .select('id')
            .or(`and(user1.eq.${currentUser.id},user2.eq.${activeProfile.id}),and(user1.eq.${activeProfile.id},user2.eq.${currentUser.id})`)
            .limit(1);

        let matchId;
        if (existing && existing.length > 0) {
            matchId = existing[0].id;
        } else {
            const { data: newMatch, error } = await sb.from('matches').insert({
                user1: currentUser.id, user2: activeProfile.id, last_message: text
            }).select('id').single();
            if (error) { console.error(error); btn.disabled = false; btn.textContent = 'SEND →'; return; }
            matchId = newMatch.id;
        }

        await sb.from('messages').insert({ match_id: matchId, sender_id: currentUser.id, text });

        closeModal(null, true);
        const toast = document.getElementById('match-toast');
        toast.textContent = '✓ MESSAGE_SENT — view in matches';
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); toast.textContent = '♥ IT\'S A MATCH — START_CHATTING →'; }, 3000);
    }

    function likeProfile() {
        document.getElementById('modal').classList.remove('open');
        const toast = document.getElementById('match-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }

    function toggleNotif(e) {
        e.stopPropagation();
        document.getElementById('notif-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', () => document.getElementById('notif-dropdown')?.classList.remove('open'));

    function timeAgo(iso) {
        const diff = Date.now() - new Date(iso).getTime();
        const m = Math.floor(diff / 60000);
        if (m < 1) return 'just now';
        if (m < 60) return m + 'm ago';
        const h = Math.floor(m / 60);
        if (h < 24) return h + 'h ago';
        return Math.floor(h / 24) + 'd ago';
    }

    let _lastChecked = localStorage.getItem('notif_checked') || new Date(0).toISOString();

    async function loadNotifications() {
        // Get matches where I am user2 (someone messaged me) created after last check
        const { data: newMatches } = await sb.from('matches')
            .select('id, user1, profiles!matches_user1_fkey(name), created_at')
            .eq('user2', currentUser.id)
            .gt('created_at', _lastChecked);

        // Get new messages in my matches sent by others
        const { data: myMatches } = await sb.from('matches')
            .select('id')
            .or(`user1.eq.${currentUser.id},user2.eq.${currentUser.id}`);

        const matchIds = (myMatches || []).map(m => m.id);
        let newMessages = [];
        if (matchIds.length > 0) {
            const { data } = await sb.from('messages')
                .select('id, text, sender_id, created_at, match_id, profiles!messages_sender_id_fkey(name)')
                .in('match_id', matchIds)
                .neq('sender_id', currentUser.id)
                .gt('created_at', _lastChecked)
                .order('created_at', { ascending: false })
                .limit(10);
            newMessages = data || [];
        }

        const notifs = [
            ...(newMatches || []).map(m => ({
                text: `<span class="notif-name">${m['profiles!matches_user1_fkey']?.name || 'Someone'}</span> sent you a message`,
                time: m.created_at,
                href: 'matches.html'
            })),
            ...newMessages.map(msg => ({
                text: `<span class="notif-name">${msg['profiles!messages_sender_id_fkey']?.name || 'Someone'}</span>: ${msg.text.slice(0, 40)}${msg.text.length > 40 ? '...' : ''}`,
                time: msg.created_at,
                href: 'matches.html'
            }))
        ].sort((a, b) => new Date(b.time) - new Date(a.time));

        const badge = document.getElementById('bell-badge');
        const list = document.getElementById('notif-list');

        if (notifs.length > 0) {
            badge.textContent = notifs.length > 9 ? '9+' : notifs.length;
            badge.classList.add('show');
            list.innerHTML = notifs.map(n => `
                <div class="notif-item" onclick="window.location.href='${n.href}'">
                    <div>${n.text}</div>
                    <div class="notif-time">${timeAgo(n.time)}</div>
                </div>`).join('');
        } else {
            badge.classList.remove('show');
            list.innerHTML = '<div class="notif-empty">NO_NEW_NOTIFICATIONS</div>';
        }
    }

    (function(){
        const tip = document.getElementById('tip');
        let cur = null;
        document.addEventListener('mouseover', e => { const el = e.target.closest('[data-tip]'); if (!el) return; cur = el; tip.textContent = el.dataset.tip; tip.classList.add('show'); });
        document.addEventListener('mouseout', e => { if (cur && !cur.contains(e.relatedTarget)) { tip.classList.remove('show'); cur = null; } });
        document.addEventListener('mousemove', e => {
            if (!cur) return;
            const x = e.clientX + 14, y = e.clientY + 14;
            tip.style.left = (x + tip.offsetWidth > window.innerWidth ? e.clientX - tip.offsetWidth - 6 : x) + 'px';
            tip.style.top  = (y + tip.offsetHeight > window.innerHeight ? e.clientY - tip.offsetHeight - 6 : y) + 'px';
        });
        document.addEventListener('scroll', () => tip.classList.remove('show'), true);
    })();
</script>
</body>
</html>
