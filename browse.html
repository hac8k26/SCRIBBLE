<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAPKIN — Browse Profiles</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f9f7; --text: #1a1a18; --secondary: #6b6b68;
            --border: #e5e5e1; --accent: #d97757; --mono: 'IBM Plex Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--mono); overflow-x: hidden; min-height: 100vh; }

        nav {
            width: 100%; padding: 20px 40px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        .nav-logo { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; text-decoration: none; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { font-size: 11px; color: var(--secondary); text-decoration: none; letter-spacing: 0.05em; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); }
        .nav-cta { padding: 8px 18px; border: 1px solid var(--text); background: none; font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; color: var(--text); text-decoration: none; }
        .nav-cta:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* TOOLBAR */
        .toolbar {
            width: 100%; border-bottom: 1px solid var(--border);
            padding: 16px 40px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            background: var(--bg);
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--border); padding: 8px 14px; flex: 1; min-width: 200px; max-width: 360px;
        }
        .search-box input {
            border: none; background: none; font-family: var(--mono); font-size: 11px;
            color: var(--text); outline: none; width: 100%;
        }
        .search-box input::placeholder { color: var(--secondary); }
        .search-box svg { color: var(--secondary); flex-shrink: 0; }
        .filter-btn {
            padding: 8px 14px; border: 1px solid var(--border); background: none;
            font-family: var(--mono); font-size: 10px; cursor: pointer; color: var(--secondary);
            letter-spacing: 0.05em; white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .result-count { font-size: 10px; color: var(--secondary); margin-left: auto; letter-spacing: 0.05em; }

        /* LAYOUT */
        .browse-layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 120px); }

        /* SIDEBAR */
        .sidebar { border-right: 1px solid var(--border); padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }
        .filter-group-title { font-size: 9px; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 12px; }
        .filter-option { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; }
        .filter-option input[type=checkbox] { accent-color: var(--accent); width: 12px; height: 12px; }
        .filter-option label { font-size: 10px; color: var(--secondary); cursor: pointer; letter-spacing: 0.05em; }
        .filter-option:hover label { color: var(--text); }
        .range-row { display: flex; align-items: center; gap: 8px; }
        .range-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .range-val { font-size: 10px; color: var(--accent); min-width: 28px; text-align: right; }
        .sidebar-divider { height: 1px; background: var(--border); }
        .apply-btn { padding: 10px; background: var(--text); color: var(--bg); border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; width: 100%; }
        .apply-btn:hover { background: var(--accent); }

        /* PROFILE GRID */
        .profiles-area { padding: 24px 32px; }
        .profiles-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }

        /* PROFILE CARD */
        .profile-card {
            background: var(--bg); cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px; gap: 12px; transition: background 0.15s;
        }
        .profile-card:hover { background: #f1f1ee; }
        .card-left { flex: 1; min-width: 0; }
        .card-name { font-size: 11px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-age  { font-size: 9px; color: var(--secondary); margin-bottom: 3px; letter-spacing: 0.04em; }
        .card-college { font-size: 8px; color: var(--secondary); letter-spacing: 0.03em; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; opacity: 0.8; }
        .card-avatar { width: 48px; height: 48px; flex-shrink: 0; overflow: hidden; position: relative; }
        .card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(0.2); }
        .card-online { position: absolute; bottom: 2px; right: 2px; width: 7px; height: 7px; border-radius: 50%; background: #4caf50; border: 1px solid var(--bg); }

        /* MODAL */
        .modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,24,0.6); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-backdrop.open { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); max-width: 680px; width: 100%; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; }
        .modal-img { aspect-ratio: 3/4; overflow: hidden; }
        .modal-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .modal-body { padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; }
        .modal-name { font-size: 20px; font-weight: 600; }
        .modal-meta { font-size: 10px; color: var(--secondary); letter-spacing: 0.05em; line-height: 1.8; }
        .modal-bio { font-size: 11px; color: var(--secondary); line-height: 1.8; }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .modal-tag { font-size: 9px; padding: 4px 8px; border: 1px solid var(--border); color: var(--secondary); }
        .modal-actions { display: flex; gap: 8px; margin-top: auto; }
        .modal-like { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; }
        .modal-like:hover { background: #c0603e; }
        .modal-pass { flex: 1; padding: 12px; background: none; color: var(--text); border: 1px solid var(--border); font-family: var(--mono); font-size: 11px; font-weight: 600; cursor: pointer; }
        .modal-pass:hover { border-color: var(--text); }
        .modal-close { position: absolute; top: 12px; right: 12px; background: none; border: 1px solid var(--border); width: 28px; height: 28px; cursor: pointer; font-family: var(--mono); font-size: 12px; color: var(--secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { border-color: var(--accent); color: var(--accent); }

        /* MATCH TOAST */
        #match-toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(16px);
            background: var(--accent); color: #fff; font-family: var(--mono); font-size: 12px; font-weight: 600;
            padding: 16px 28px; z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.25s, transform 0.25s; letter-spacing: 0.05em;
        }
        #match-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* TOOLTIP */
        #tip { position: fixed; pointer-events: none; z-index: 99999; background: var(--text); color: var(--bg); font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; padding: 5px 9px; white-space: nowrap; opacity: 0; transition: opacity 0.15s; }
        #tip.show { opacity: 1; }

        /* AUTH GATE */
        #auth-gate {
            position: fixed; inset: 0; background: var(--bg); z-index: 99990;
            display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        #auth-gate.show { display: flex; }
        .gate-box {
            border: 1px solid var(--border); padding: 40px 48px; max-width: 420px; width: 90%;
            display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center;
            border-left: 3px solid var(--accent);
        }
        .gate-icon { font-size: 28px; }
        .gate-title { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; }
        .gate-sub { font-size: 10px; color: var(--secondary); line-height: 1.8; letter-spacing: 0.04em; }
        .gate-btn {
            padding: 12px 28px; background: var(--text); color: var(--bg);
            border: none; font-family: var(--mono); font-size: 11px; font-weight: 600;
            cursor: pointer; letter-spacing: 0.05em; text-decoration: none; display: inline-block;
        }
        .gate-btn:hover { background: var(--accent); }

        @media (max-width: 900px) {
            nav { padding: 16px 20px; }
            .toolbar { padding: 12px 20px; }
            .browse-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .profiles-area { padding: 16px; }
            .profiles-grid { grid-template-columns: repeat(3, 1fr); }
            .modal { grid-template-columns: 1fr; }
            .modal-img { aspect-ratio: 16/9; }
        }
        @media (max-width: 540px) {
            .nav-links { display: none; }
            .result-count { display: none; }
            .profiles-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo" data-tip="Back to home">NAPKIN</a>
    <a href="join.html" class="nav-cta" data-tip="Sign in to like profiles">LOGIN / JOIN →</a>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
    <div class="search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="SEARCH_PROFILES..." oninput="filterProfiles()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all', this)" data-tip="Show all profiles">ALL</button>
    <button class="filter-btn" onclick="setFilter('music', this)" data-tip="Filter by music interest">MUSIC</button>
    <button class="filter-btn" onclick="setFilter('tech', this)" data-tip="Filter by tech interest">TECH</button>
    <button class="filter-btn" onclick="setFilter('art', this)" data-tip="Filter by art interest">ART</button>
    <button class="filter-btn" onclick="setFilter('fitness', this)" data-tip="Filter by fitness interest">FITNESS</button>
    <button class="filter-btn" onclick="setFilter('travel', this)" data-tip="Filter by travel interest">TRAVEL</button>
    <span class="result-count" id="result-count">LOADING...</span>
</div>

<div class="browse-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div>
            <div class="filter-group-title">// AGE_RANGE</div>
            <div class="range-row">
                <span style="font-size:10px;color:var(--secondary);">18</span>
                <input type="range" min="18" max="60" value="40" id="age-max" oninput="document.getElementById('age-val').textContent=this.value">
                <span class="range-val" id="age-val">40</span>
            </div>
        </div>
        <div class="sidebar-divider"></div>
        <div>
            <div class="filter-group-title">// LOOKING_FOR</div>
            <div class="filter-option"><input type="checkbox" id="f1" checked><label for="f1">RELATIONSHIP</label></div>
            <div class="filter-option"><input type="checkbox" id="f2" checked><label for="f2">FRIENDSHIP</label></div>
            <div class="filter-option"><input type="checkbox" id="f3"><label for="f3">CASUAL</label></div>
            <div class="filter-option"><input type="checkbox" id="f4"><label for="f4">NETWORKING</label></div>
        </div>
        <div class="sidebar-divider"></div>
        <div>
            <div class="filter-group-title">// INTERESTS</div>
            <div class="filter-option"><input type="checkbox" id="i1" checked><label for="i1">MUSIC</label></div>
            <div class="filter-option"><input type="checkbox" id="i2" checked><label for="i2">TECH</label></div>
            <div class="filter-option"><input type="checkbox" id="i3" checked><label for="i3">ART</label></div>
            <div class="filter-option"><input type="checkbox" id="i4" checked><label for="i4">FITNESS</label></div>
            <div class="filter-option"><input type="checkbox" id="i5" checked><label for="i5">TRAVEL</label></div>
            <div class="filter-option"><input type="checkbox" id="i6" checked><label for="i6">FOOD</label></div>
            <div class="filter-option"><input type="checkbox" id="i7" checked><label for="i7">GAMING</label></div>
            <div class="filter-option"><input type="checkbox" id="i8" checked><label for="i8">BOOKS</label></div>
        </div>
        <div class="sidebar-divider"></div>
        <button class="apply-btn">APPLY_FILTERS</button>
    </aside>

    <!-- PROFILES -->
    <main class="profiles-area">
        <div class="profiles-grid" id="profiles-grid"></div>
    </main>
</div>

<!-- PROFILE MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-inner">
        <button class="modal-close" onclick="closeModal(null, true)" data-tip="Close">✕</button>
        <div class="modal-img"><img id="modal-img" src="" alt=""></div>
        <div class="modal-body">
            <div>
                <div class="modal-name" id="modal-name"></div>
                <div class="modal-meta" id="modal-meta"></div>
            </div>
            <div class="modal-bio" id="modal-bio"></div>
            <div class="modal-tags" id="modal-tags"></div>
            <div class="modal-actions">
                <button class="modal-like" onclick="likeProfile()" data-tip="Like this profile">♥ LIKE_PROFILE</button>
                <button class="modal-pass" onclick="closeModal(null,true)" data-tip="Pass on this profile">PASS →</button>
            </div>
        </div>
    </div>
</div>

<div id="match-toast">♥ IT'S A MATCH — START_CHATTING →</div>
<div id="tip"></div>
<div id="auth-gate">
    <div class="gate-box">
        <div class="gate-icon">⚠</div>
        <div class="gate-title">ACCESS_RESTRICTED</div>
        <div class="gate-sub">You need to join or login<br>before browsing profiles.</div>
        <a href="auth.html" class="gate-btn">$ LOGIN / JOIN →</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script>
<script>
    (function(){
        const { Client, Account } = Appwrite;
        const client = new Client()
            .setEndpoint('https://fra.cloud.appwrite.io/v1')
            .setProject('69c764d8003a944c2295');
        new Account(client).get().catch(() => {
            document.getElementById('auth-gate').classList.add('show');
        });
    })();
</script>
<script>
const PROFILES = [
    { id:1, name:'alex_k', age:27, city:'Berlin', job:'Software Engineer', looking:'Relationship', tags:['tech','music','cycling'], bio:'OSS contributor by day, vinyl collector by night. Looking for someone to explore record shops and hackathons with.', seed:64, online:true, college:'GITAM University' },
    { id:2, name:'sam_r', age:24, city:'London', job:'Graphic Designer', looking:'Friendship', tags:['art','music','travel'], bio:'I design things and then immediately redesign them. Love gallery openings, good coffee, and spontaneous weekend trips.', seed:91, online:false, college:'GVPW (GVP College for Women)' },
    { id:3, name:'jordan_m', age:29, city:'NYC', job:'Musician', looking:'Relationship', tags:['music','art','food'], bio:'Session guitarist and amateur chef. If you can appreciate a good riff and a good risotto, we\'ll get along fine.', seed:33, online:true, college:'AUCE (Andhra University)' },
    { id:4, name:'riley_t', age:26, city:'Amsterdam', job:'Data Scientist', looking:'Casual', tags:['tech','fitness','books'], bio:'I run models and marathons. Currently reading everything by Ursula K. Le Guin. Probably overthinking this bio.', seed:150, online:true, college:'ANITS' },
    { id:5, name:'casey_l', age:31, city:'Tokyo', job:'Architect', looking:'Relationship', tags:['art','travel','food'], bio:'Designing buildings and eating my way through every city I visit. Fluent in Japanese, sarcasm, and AutoCAD.', seed:200, online:false, college:'Bullayya College' },
    { id:6, name:'morgan_p', age:25, city:'Paris', job:'Photographer', looking:'Friendship', tags:['art','travel','music'], bio:'Street photographer. I see the world in 35mm. Looking for people who notice the small things.', seed:77, online:true, college:'Mrs. AVN College' },
    { id:7, name:'drew_s', age:28, city:'Toronto', job:'Game Developer', looking:'Relationship', tags:['gaming','tech','music'], bio:'I make games and play too many of them. Also into tabletop RPGs and lo-fi beats. Let\'s co-op something.', seed:120, online:false, college:'GVPCE' },
    { id:8, name:'avery_n', age:23, city:'Melbourne', job:'Barista / Writer', looking:'Casual', tags:['food','books','art'], bio:'Writing a novel one espresso at a time. I\'ll talk about books, coffee, and the meaning of life — in that order.', seed:55, online:true, college:'St. Joseph\'s Women\'s College' },
    { id:9, name:'quinn_b', age:32, city:'Barcelona', job:'Yoga Instructor', looking:'Relationship', tags:['fitness','travel','food'], bio:'I teach yoga, grow herbs on my balcony, and believe in slow mornings. Looking for someone who isn\'t always in a rush.', seed:180, online:false, college:'Raghu Engineering College' },
    { id:10, name:'taylor_v', age:27, city:'Seoul', job:'UX Designer', looking:'Friendship', tags:['tech','art','gaming'], bio:'I design interfaces and break them to see what happens. Big fan of K-indie music and late-night ramen runs.', seed:99, online:true, college:'DIET (Dadi Institute)' },
    { id:11, name:'blake_o', age:30, city:'Chicago', job:'Chef', looking:'Relationship', tags:['food','music','fitness'], bio:'Professional chef, amateur runner. I\'ll cook for you on the third date. Maybe the second if you\'re interesting.', seed:210, online:false, college:'Vignan\'s Institute (VIIT)' },
    { id:12, name:'skyler_h', age:26, city:'Lisbon', job:'Freelance Dev', looking:'Casual', tags:['tech','travel','books'], bio:'Remote worker, full-time wanderer. Currently based in Lisbon, next month who knows. Looking for good conversations.', seed:44, online:true, college:'Pydah College of Engineering' },
];

let activeFilter = 'all';
let activeProfile = null;

function renderProfiles(list) {
    const grid = document.getElementById('profiles-grid');
    document.getElementById('result-count').textContent = `${list.length}_PROFILES`;
    grid.innerHTML = '';
    list.forEach(p => {
        const card = document.createElement('div');
        card.className = 'profile-card';
        card.innerHTML = `
            <div class="card-left">
                <div class="card-name">${p.name}</div>
                <div class="card-age">AGE · ${p.age}</div>
                <div class="card-college">${p.college}</div>
            </div>
            <div class="card-avatar">
                <img src="https://picsum.photos/seed/${p.seed}/80/80" loading="lazy" alt="">
                ${p.online ? '<div class="card-online"></div>' : ''}
            </div>`;
        card.addEventListener('click', () => openModal(p.id));
        grid.appendChild(card);
    });
}

function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterProfiles();
}

function filterProfiles() {
    const q = document.getElementById('search-input').value.toLowerCase();
    let list = PROFILES;
    if (activeFilter !== 'all') list = list.filter(p => p.tags.includes(activeFilter));
    if (q) list = list.filter(p => p.name.includes(q) || p.city.toLowerCase().includes(q) || p.tags.some(t => t.includes(q)));
    renderProfiles(list);
}

function openModal(id) {
    const p = PROFILES.find(x => x.id === id);
    if (!p) return;
    activeProfile = p;
    document.getElementById('modal-img').src = `https://picsum.photos/seed/${p.seed}/400/600`;
    document.getElementById('modal-name').textContent = p.name;
    document.getElementById('modal-meta').innerHTML = `AGE: ${p.age}<br>CITY: ${p.city}<br>JOB: ${p.job.toUpperCase()}<br>LOOKING_FOR: ${p.looking.toUpperCase()}`;
    document.getElementById('modal-bio').textContent = p.bio;
    document.getElementById('modal-tags').innerHTML = p.tags.map(t => `<span class="modal-tag">${t.toUpperCase()}</span>`).join('');
    document.getElementById('modal').classList.add('open');
}

function closeModal(e, force) {
    if (force || (e && e.target === document.getElementById('modal'))) {
        document.getElementById('modal').classList.remove('open');
    }
}

function likeProfile() {
    document.getElementById('modal').classList.remove('open');
    showMatchToast();
}

function quickLike(id) { showMatchToast(); }

function showMatchToast() {
    // 30% chance of "match" for demo
    if (Math.random() < 0.3) {
        const toast = document.getElementById('match-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }
}

// Tooltip
(function(){
    const tip = document.getElementById('tip');
    let cur = null;
    document.addEventListener('mouseover', e => {
        const el = e.target.closest('[data-tip]');
        if (!el) return;
        cur = el; tip.textContent = el.dataset.tip; tip.classList.add('show');
    });
    document.addEventListener('mouseout', e => {
        if (cur && !cur.contains(e.relatedTarget)) { tip.classList.remove('show'); cur = null; }
    });
    document.addEventListener('mousemove', e => {
        if (!cur) return;
        const x = e.clientX + 14, y = e.clientY + 14;
        tip.style.left = (x + tip.offsetWidth > window.innerWidth ? e.clientX - tip.offsetWidth - 6 : x) + 'px';
        tip.style.top  = (y + tip.offsetHeight > window.innerHeight ? e.clientY - tip.offsetHeight - 6 : y) + 'px';
    });
    document.addEventListener('scroll', () => tip.classList.remove('show'), true);
})();

// Init
renderProfiles(PROFILES);
</script>
</body>
</html>
